spring.application.name=api-gateway2

server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webmvc.routes[0].id=user-service2-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE2
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=civic-service2-route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://CIVIC-SERVICE2
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/reports/**,/api/rewards/**,/api/notifications/**,/api/ai-reports/**
