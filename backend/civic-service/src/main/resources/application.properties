spring.application.name=civic-service2

server.port=8095

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/civic2_db
spring.datasource.username=root
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082/realms/aynak

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=aynaksupport@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
